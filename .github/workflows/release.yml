name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.2.3"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: WINHOME
  PROJECT_PATH: WINHOME.csproj
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}" -replace '^v', ''
          } else {
            $version = "0.0.0-dev.${{ github.run_number }}"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "Version '$version' is invalid. Use a SemVer value such as 1.2.3 or v1.2.3."
          }

          $numericVersion = $version -replace '[-+].*$', ''
          $assemblyVersion = "$numericVersion.0"
          $repo = (Get-Location).Path

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSEMBLY_VERSION=$assemblyVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PUBLISH_DIR=$repo\artifacts\publish\$env:APP_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append
          "DIST_DIR=$repo\artifacts\dist" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $env:PUBLISH_DIR `
            -p:Version=$env:VERSION `
            -p:AssemblyVersion=$env:ASSEMBLY_VERSION `
            -p:FileVersion=$env:ASSEMBLY_VERSION `
            -p:InformationalVersion=$env:VERSION `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:DIST_DIR | Out-Null
          $zipPath = Join-Path $env:DIST_DIR "$env:APP_NAME-$env:VERSION-win-x64-portable.zip"
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }

          & $iscc "installer\WINHOME.iss" `
            "/DAppVersion=$env:VERSION" `
            "/DSourceDir=$env:PUBLISH_DIR" `
            "/DOutputDir=$env:DIST_DIR" `
            "/DOutputBaseFilename=$env:APP_NAME-$env:VERSION-win-x64-setup"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WINHOME-win-x64-${{ github.run_number }}
          path: artifacts/dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem $env:DIST_DIR -File | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
          } else {
            gh release create $tag $files --title "$env:APP_NAME $env:VERSION" --generate-notes
          }
